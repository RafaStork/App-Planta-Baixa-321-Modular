<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>321 Modular — Editor de Plantas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/svg2pdf.js@2.4.0/dist/svg2pdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  :root{
    --ink:#1C1F24; --ink-soft:#5A626C; --ink-faint:#9099A3;
    --bg:#EEF0F2; --surface:#FFFFFF; --line:#E2E5E9; --line-soft:#EDEFF2;
    --paper:#FAFAF8; --grid:#DCE0E5; --grid-major:#C3CAD2;
    --accent:#E8590C; --accent-soft:rgba(232,89,12,.12); --accent-line:rgba(232,89,12,.45);
    --ok:#2B8A3E; --over:#D6336C;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --r:8px; --shadow:0 1px 2px rgba(20,24,30,.06),0 6px 20px rgba(20,24,30,.06);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:'Montserrat', sans-serif;color:var(--ink);background:var(--bg);
    display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;
    user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none}
  input,textarea,select{user-select:text;-webkit-user-select:text}
  button{font-family:inherit;cursor:pointer}
  header{display:flex;align-items:center;gap:14px;padding:9px 14px;background:var(--surface);
    border-bottom:1px solid var(--line);z-index:30;flex-wrap:wrap}
  .wordmark{font-family:var(--mono);font-weight:600;letter-spacing:.14em;font-size:12px;white-space:nowrap}
  .wordmark b{color:var(--accent)}
  .proj{font-size:13px;color:var(--ink-soft);border:1px solid var(--line);background:var(--paper);
    border-radius:6px;padding:5px 9px;min-width:130px;font-family:inherit;}
  .proj:focus{outline:2px solid var(--accent-line);border-color:transparent}
  .bar-group{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .spacer{flex:1}
  /* ── Chip de usuário (canto superior direito) ── */
  .user-chip{display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:8px;
    background:var(--paper);border:1px solid var(--line);font-size:12px;white-space:nowrap}
  .user-chip-perfil{font-weight:700;color:var(--ink)}
  .user-chip-sep{color:var(--line);margin:0 1px}
  .user-chip-franquia{color:var(--ink-soft);font-size:11.5px}
  #btnLogout{padding:3px 8px;font-size:11px;background:none;border:1px solid var(--line);
    border-radius:5px;cursor:pointer;color:var(--ink-soft);font-family:inherit;font-weight:600;
    transition:border-color .15s,color .15s}
  #btnLogout:hover{border-color:#c62828;color:#c62828}
  .tbtn{border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);
    border-radius:6px;padding:6px 10px;font-size:12.5px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;font-weight:600;}
  .tbtn:hover{border-color:var(--ink-faint);color:var(--ink)}
  .tbtn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .tbtn.primary:hover{background:#000}
  .tbtn.accent{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tbtn.accent:hover{filter:brightness(1.05)}
  main{flex:1;display:flex;min-height:0}
  aside{width:288px;background:var(--surface);border-right:1px solid var(--line);
    display:flex;flex-direction:column;min-height:0}
  .tabs-container { display:flex; overflow-x:auto; padding:12px 14px 0; background:var(--surface); gap:4px; border-bottom:1px solid var(--line); }
  .tabs-container::-webkit-scrollbar { display:none; }
  .tabs-container .tbtn { border-bottom:none; border-radius:8px 8px 0 0; padding:8px 12px; font-size:11.5px; opacity:0.6; }
  .tabs-container .tbtn.active { opacity:1; background:var(--paper); border-color:var(--line); color:var(--ink); font-weight:700; border-bottom:2px solid var(--paper); margin-bottom:-1px;}
  .panel-head{padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between}
  .panel-head h2{margin:0;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .inv{overflow:auto;flex:1;padding:0 10px 10px; background:var(--paper);}
  .ptype{border:1px solid var(--line);border-radius:var(--r);padding:9px 10px;margin:8px 4px;
    background:var(--surface);transition:border-color .12s,box-shadow .12s}
  .ptype:hover{border-color:var(--ink-faint);box-shadow:var(--shadow)}
  .ptype.armed{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
  .ptype.geral-only{cursor:default;opacity:.75}
  .ptype.geral-only:hover{border-color:var(--line);box-shadow:none}
  .ptype .row1{display:flex;align-items:center;gap:9px}
  .swatch{width:14px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,.18);flex:none}
  .pname{font-size:13px;font-weight:700;flex:1;line-height:1.2}
  .dims{font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-top:2px}
  .mini{font-size:11px;color:var(--ink-faint);background:none;border:none;padding:2px 5px;border-radius:5px;font-weight:600}
  .mini:hover{background:var(--line-soft);color:var(--ink)}
  .budget{margin-top:7px}
  .budget .nums{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
  .add-type{width:calc(100% - 8px);margin:4px;border:1px dashed var(--line);background:var(--paper);
    color:var(--ink-soft);border-radius:var(--r);padding:9px;font-size:12.5px;font-weight:600}
  .add-type:hover{border-color:var(--accent);color:var(--accent)}
  .totals{padding:11px 14px;border-top:1px solid var(--line);background:var(--paper);font-family:var(--mono);font-size:11.5px;color:var(--ink-soft)}
  .totals b{color:var(--ink)} .totals .line{display:flex;justify-content:space-between;margin:2px 0}
  .totals .area b{color:var(--accent)}
  .stage{flex:1;position:relative;background:var(--bg);min-width:0}
  #canvas{width:100%;height:100%;display:block;touch-action:none;font-family:'Montserrat',sans-serif}
  #canvas.placing{cursor:copy} #canvas.panning{cursor:grabbing}
  .name-lbl{font-family:'Montserrat',sans-serif;fill:var(--ink);font-weight:700;text-anchor:middle;cursor:move}
  .room-lbl{font-family:'Montserrat',sans-serif;fill:var(--ink);font-weight:700;text-anchor:middle;cursor:pointer}
  .tools{position:absolute;top:12px;left:12px;display:flex;gap:4px;background:var(--surface);
    border:1px solid var(--line);border-radius:9px;padding:4px;box-shadow:var(--shadow)}
  .tool{border:none;background:none;border-radius:6px;width:34px;height:34px;font-size:15px;color:var(--ink-soft);
    display:grid;place-items:center;outline:none;-webkit-tap-highlight-color:transparent}
  .tool:hover{background:var(--line-soft);color:var(--ink)}
  .tool.active{background:var(--accent);color:#fff}
  .tool:focus{outline:none}
  .tool:focus-visible{outline:2px solid var(--accent-line)}
  .zoombar{position:absolute;bottom:12px;left:12px;display:flex;gap:4px;align-items:center;background:var(--surface);
    border:1px solid var(--line);border-radius:9px;padding:4px;box-shadow:var(--shadow);font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
  .zoombar button{border:none;background:none;width:28px;height:28px;border-radius:6px;font-size:15px;color:var(--ink-soft)}
  .zoombar button:hover{background:var(--line-soft);color:var(--ink)}
  .zoombar .z{min-width:46px;text-align:center}
  .footprint{position:absolute;top:12px;right:12px;background:var(--surface);border:1px solid var(--line);
    border-radius:9px;padding:7px 11px;box-shadow:var(--shadow);font-family:var(--mono);font-size:11px;color:var(--ink-soft);text-align:right;line-height:1.5}
  .footprint b{color:var(--ink)} .footprint .a{color:var(--accent)}
  .selbar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:none;gap:4px;align-items:center;
    background:var(--ink);border-radius:10px;padding:6px;box-shadow:var(--shadow);max-width:95vw;flex-wrap:wrap;justify-content:center;z-index:40;}
  .selbar.show{display:flex}
  .selbar .lab{color:var(--ink-faint);font-size:10.5px;padding:0 3px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em}
  .selbar button{border:none;background:rgba(255,255,255,.08);color:#cfd4da;border-radius:6px;padding:6px 9px;font-size:12px;font-family:'Montserrat',sans-serif;font-weight:600}
  .selbar button:hover{background:rgba(255,255,255,.16);color:#fff}
  .selbar button.on{background:var(--accent);color:#fff}
  .selbar button.cstate{min-width:84px}
  .selbar .corner{width:30px;font-size:13px}
  .selbar .corner:disabled{opacity:0.3;cursor:not-allowed;background:rgba(255,255,255,.04)}
  .selbar .sep{width:1px;height:22px;background:rgba(255,255,255,.16);margin:0 3px}
  .selbar .del:hover{background:var(--over);color:#fff}
  svg.rubberband{cursor:crosshair}
  .hint{position:absolute;bottom:12px;right:12px;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);
    text-align:right;line-height:1.5;pointer-events:none;max-width:250px}
  .scrim{position:fixed;inset:0;background:rgba(20,24,30,.42);display:none;place-items:center;z-index:50;padding:18px}
  .scrim.show{display:grid}
  .modal{background:var(--surface);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.25);
    width:100%;max-width:400px;padding:20px;max-height:88vh;overflow:auto}
  .modal.q-wide{max-width:min(96vw,920px);padding:18px 22px;overflow:auto}
  /* ── Overlay separado para config de margens (segurança visual) ── */
  #gestorOverlay{position:fixed;inset:0;background:rgba(20,24,30,.60);display:none;place-items:center;z-index:60}
  #gestorOverlay.show{display:grid}
  /* Botão ⚙ — apenas ícone, discreto, canto esquerdo das ações */
  .q-conf-btn{margin-right:auto;width:30px;height:30px;padding:0;font-size:15px;opacity:0.40;border-radius:50%;display:flex;align-items:center;justify-content:center;line-height:1}
  .q-conf-btn:hover{opacity:0.80}
  /* Tela de confirmação antes de abrir margens */
  .gc-confirm{text-align:center;padding:8px 4px 4px}
  .gc-confirm .gc-warn-icon{font-size:38px;margin-bottom:10px;display:block}
  .gc-confirm h3{font-size:16px;font-weight:800;margin:0 0 6px}
  .gc-confirm p{font-size:13px;color:var(--ink-soft);margin:0 0 20px;line-height:1.5}
  .gc-confirm .gc-btns{display:flex;gap:10px;justify-content:center}
  /* "Não" é primário/destaque — botão grande e cor forte */
  .gc-btn-nao{flex:1.4;padding:11px;font-size:14px;font-weight:800;background:var(--accent);color:#fff;border:none;border-radius:9px;cursor:pointer;font-family:'Montserrat',sans-serif;letter-spacing:.01em}
  .gc-btn-nao:hover{filter:brightness(1.1)}
  /* "Sim" é fraco — texto simples, sem destaque */
  .gc-btn-sim{flex:1;padding:11px;font-size:13px;font-weight:600;background:transparent;color:var(--ink-faint);border:1px solid var(--line);border-radius:9px;cursor:pointer;font-family:'Montserrat',sans-serif}
  .gc-btn-sim:hover{background:var(--bg);color:var(--ink-soft)}
  /* ── Ajuste manual de qty na tabela ── */
  .q-adj{display:inline-flex;align-items:center;gap:3px;margin-left:4px}
  .q-adj button{width:20px;height:20px;border:1px solid var(--line);border-radius:4px;background:var(--bg);color:var(--ink);font-size:12px;line-height:1;cursor:pointer;padding:0}
  .q-adj button:hover{background:var(--line)}
  .q-delta{font-size:11px;color:var(--ink-soft);min-width:24px;text-align:center;font-family:var(--mono)}
  .q-qty-final{font-weight:800;font-size:15px}
  /* ── Seção itens avulsos ── */
  .q-avulso-section{border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:var(--bg);flex-shrink:0}
  .q-avulso-section .q-avulso-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px}
  .q-avulso-row{display:flex;align-items:center;gap:6px;flex-wrap:nowrap}
  .q-avulso-row select{flex:2;min-width:0;font-family:'Montserrat',sans-serif;font-size:12px;border:1px solid var(--line);border-radius:6px;padding:5px 6px;background:var(--surface);color:var(--ink)}
  .q-avulso-row input[type=number]{width:60px;font-family:var(--mono);font-size:13px;font-weight:700;border:1px solid var(--line);border-radius:6px;padding:4px 6px;text-align:right}
  .q-avulso-added{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}
  .q-avulso-tag{display:inline-flex;align-items:center;gap:5px;background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:2px 8px 2px 10px;font-size:11.5px;color:var(--ink)}
  .q-avulso-tag button{border:none;background:none;color:var(--ink-faint);cursor:pointer;font-size:13px;padding:0;line-height:1}
  .modal h3{margin:0 0 4px;font-size:16px;font-weight:700}
  .modal .sub{margin:0 0 14px;font-size:12px;color:var(--ink-faint)}
  .field{margin-bottom:11px}
  .field label{display:block;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px;font-weight:700}
  .field input, .field select{width:100%;border:1px solid var(--line);border-radius:6px;padding:8px 9px;font-size:13px;font-family:'Montserrat',sans-serif;font-weight:600}
  .field input:focus, .field select:focus{outline:2px solid var(--accent-line);border-color:transparent}
  .two{display:flex;gap:10px} .two .field{flex:1}
  .swatches{display:flex;gap:7px;flex-wrap:wrap;margin-top:2px}
  .sw{width:26px;height:26px;border-radius:6px;border:2px solid transparent;cursor:pointer}
  .sw.on{border-color:var(--ink);box-shadow:0 0 0 2px #fff inset}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
  .modal .del-link{margin-right:auto;color:var(--over);background:none;border:none;font-size:12.5px;font-family:'Montserrat',sans-serif;font-weight:700}
  /* ── Accordion sections no modal de tipo ── */
  .tm-section{border:1px solid var(--line);border-radius:10px;margin-bottom:8px;overflow:hidden;background:var(--surface)}
  .tm-section>summary{cursor:pointer;padding:9px 12px;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);user-select:none;list-style:none;display:flex;align-items:center;gap:7px;background:var(--bg)}
  .tm-section>summary::-webkit-details-marker{display:none}
  .tm-section>summary::after{content:"▸";margin-left:auto;color:var(--ink-faint);transition:transform .18s}
  .tm-section[open]>summary{border-bottom:1px solid var(--line)}
  .tm-section[open]>summary::after{transform:rotate(90deg)}
  .tm-section>.tm-body{padding:10px 12px 6px}
  .bom-title{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
  .empty{color:var(--ink-faint);font-size:13px;text-align:center;padding:18px 0;font-weight:600}
  .menu-toggle{display:none}
  @media(max-width:760px){
    aside{position:absolute;z-index:25;height:100%;box-shadow:var(--shadow);transform:translateX(-100%);transition:transform .2s}
    aside.open{transform:none}
    .menu-toggle{display:inline-flex}
    .hint{display:none}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}

  /* ── Módulo Quantitativo ── */
  .q-modal{display:flex;flex-direction:column;gap:8px;max-height:82vh}
  .q-modal h3{margin:0 0 10px;font-size:17px;font-weight:800;color:var(--ink)}
  .q-header{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
  .q-session{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border:1px solid var(--line);border-radius:10px}
  .q-session label{display:none} /* seletores removidos — controle por token */
  .q-session select{display:none}
  .q-margem-badge{margin-left:auto;font-size:12px;color:var(--ink-soft);padding:4px 10px;background:var(--paper);border:1px solid var(--line);border-radius:20px;white-space:nowrap}
  .q-margem-badge b{color:var(--accent)}
  /* ── Auth overlay ── */
  #authOverlay{position:fixed;inset:0;z-index:9999;background:rgba(18,22,26,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .4s}
  #authOverlay.hidden{opacity:0;pointer-events:none}
  #authOverlay img{height:52px;opacity:.92}
  #authOverlay .auth-msg{font-size:14px;font-weight:700;color:#c9d8c4;text-align:center;max-width:360px;line-height:1.5}
  #authOverlay .auth-spinner{width:30px;height:30px;border:3px solid rgba(255,255,255,.15);border-top-color:#a7c798;border-radius:50%;animation:spin .8s linear infinite}
  #authOverlay .auth-error{color:#ef9a9a;font-size:13px;font-weight:600;text-align:center;max-width:340px;line-height:1.6;padding:14px 18px;border:1px solid rgba(239,154,154,.35);border-radius:10px;background:rgba(198,40,40,.12)}
  /* ── Formulário de login manual ── */
  .auth-form{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:320px}
  .auth-form-sub{font-size:12.5px;color:rgba(255,255,255,.4);margin:0;text-align:center}
  #tokenInput{width:100%;box-sizing:border-box;padding:11px 14px;border-radius:10px;border:1.5px solid rgba(167,199,152,.3);background:rgba(255,255,255,.06);color:#e8f0e6;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:600;letter-spacing:.05em;text-align:center;outline:none;transition:border-color .2s}
  #tokenInput:focus{border-color:rgba(167,199,152,.7);background:rgba(255,255,255,.09)}
  #tokenInput::placeholder{color:rgba(255,255,255,.25);font-weight:400;letter-spacing:normal}
  #btnEntrar{width:100%;padding:11px;font-size:14px;font-weight:800;background:#a7c798;color:#1f331b;border:none;border-radius:10px;cursor:pointer;font-family:'Montserrat',sans-serif;transition:filter .2s}
  #btnEntrar:hover{filter:brightness(1.08)}
  #btnEntrar:disabled{opacity:.55;cursor:not-allowed}
  .auth-remember{display:flex;align-items:center;gap:7px;color:rgba(255,255,255,.35);font-size:11.5px;cursor:pointer;user-select:none}
  .auth-remember input[type=checkbox]{accent-color:#a7c798;width:14px;height:14px;cursor:pointer}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* ── Painel de edição de margens (Gestor) ── */
  /* ── Gestor panel — acordeão compacto ── */
  .q-gestor-panel{border:1px solid #ffe082;border-radius:10px;background:#fffde7;overflow:hidden;flex-shrink:0}
  .q-gestor-panel summary{cursor:pointer;padding:7px 12px;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#795548;user-select:none;list-style:none;display:flex;align-items:center;gap:6px}
  .q-gestor-panel summary::-webkit-details-marker{display:none}
  .q-gestor-panel summary::after{content:"▸";margin-left:auto;transition:transform .2s}
  .q-gestor-panel[open] summary::after{transform:rotate(90deg)}
  .q-gp-body{padding:8px 12px 10px;display:flex;flex-wrap:wrap;gap:8px 14px;align-items:flex-end}
  .q-gp-field{display:flex;flex-direction:column;gap:3px}
  .q-gp-field label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft)}
  .q-gp-row-inner{display:flex;align-items:center;gap:4px}
  .q-gp-input{font-family:var(--mono);font-size:13px;font-weight:700;width:68px;padding:4px 6px;border:1px solid var(--line);border-radius:6px;text-align:right}
  .q-gp-unit{font-size:12px;color:var(--ink-faint)}
  .q-gp-save{align-self:flex-end}
  .q-gp-status{font-size:11.5px;color:#2e7d32;min-height:15px;width:100%;margin-top:2px}
  .q-summary{display:flex;gap:16px;padding:8px 12px;border-radius:8px;background:var(--paper);border:1px solid var(--line);font-size:12.5px;color:var(--ink-soft);flex-wrap:wrap;flex-shrink:0}
  .q-summary b{color:var(--ink)}
  .q-table-wrap{overflow-y:auto;flex:1;min-height:120px;border:1px solid var(--line);border-radius:10px;margin:0}
  .q-table{width:100%;border-collapse:collapse;font-size:13px}
  .q-table thead th{position:sticky;top:0;background:var(--paper);z-index:2;padding:8px 10px;text-align:left;font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-faint);border-bottom:1px solid var(--line)}
  .q-table tbody tr:hover{background:var(--bg)}
  .q-table tbody tr:last-child td{border-bottom:none}
  .q-table td{padding:8px 10px;border-bottom:1px solid var(--line);color:var(--ink);vertical-align:middle}
  .q-table td.num{text-align:right;font-family:var(--mono);font-size:12.5px}
  .q-table .q-type-name{font-weight:600;font-size:13px}
  .q-table .q-dims{font-size:11px;color:var(--ink-faint)}
  .q-table .q-qty-cell{font-size:15px;font-weight:800;color:var(--ink)}
  .q-table .q-sem-preco{color:var(--ink-faint);font-size:11px}
  .q-table .q-preco-cell{color:var(--ink-soft)}
  .q-table .q-no-preco-row td{opacity:.65}
  .q-warn{margin-top:8px;padding:8px 12px;border-radius:8px;background:#fff8e1;border:1px solid #ffe082;font-size:12px;color:#795548;flex-shrink:0}
  .q-total-block{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-top:2px solid var(--line);margin-top:0;background:var(--paper);border-radius:0 0 10px 10px;flex-shrink:0}
  .q-total-block .q-total-label{font-size:13px;font-weight:700;color:var(--ink-soft)}
  .q-total-block .q-total-val{font-size:20px;font-weight:900;color:var(--accent);font-family:var(--mono)}
  .q-desconto-block{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--line);background:var(--bg);flex-shrink:0;flex-wrap:wrap}
  .q-desconto-block label{font-size:12px;font-weight:700;color:var(--ink-soft);white-space:nowrap}
  .q-desconto-block .q-desc-inputs{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
  .q-desconto-block input[type=number]{width:80px;padding:4px 7px;border:1px solid var(--line);border-radius:7px;font-family:var(--mono);font-size:13px;background:var(--surface);color:var(--ink)}
  .q-desconto-block select{padding:4px 7px;border:1px solid var(--line);border-radius:7px;font-family:'Montserrat',sans-serif;font-size:12px;background:var(--surface);color:var(--ink)}
  .q-desconto-block .q-desc-val{font-size:13px;font-weight:700;color:#c62828;font-family:var(--mono);white-space:nowrap}
  .q-final-block{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--accent-soft,#eaf3e7);border-radius:0 0 10px 10px;flex-shrink:0;border-top:2px solid var(--accent)}
  .q-final-block .q-final-label{font-size:13px;font-weight:700;color:var(--ink-soft)}
  .q-final-block .q-final-val{font-size:22px;font-weight:900;color:var(--accent);font-family:var(--mono)}
  .ptype .q-price-badge{font-size:10.5px;font-family:var(--mono);color:var(--ink-faint);margin-top:2px}
  .ptype .q-price-badge.has-price{color:#2e7d32;font-weight:700}
  /* ── Rede (crosshatch) no piso ── */
  #canvas.rede-tool{cursor:default} /* ferramenta removida, classe mantida por segurança */
  /* ── Editor BOM no modal de tipo ── */
  .bom-section{border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:var(--bg);margin-bottom:10px}
  .bom-section .bom-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .bom-section .bom-title button{margin-left:auto}
  .bom-row{display:flex;align-items:center;gap:5px;margin-bottom:6px;flex-wrap:nowrap}
  .bom-row select,.bom-row input[type=number]{font-family:'Montserrat',sans-serif;font-size:11.5px;border:1px solid var(--line);border-radius:6px;padding:4px 6px;background:var(--surface);color:var(--ink)}
  .bom-row .bom-prod{flex:2;min-width:0}
  .bom-row .bom-cond{flex:2;min-width:0}
  .bom-row .bom-qty{width:52px;text-align:right}
  .bom-row .bom-del{flex-shrink:0;background:none;border:none;color:var(--over);cursor:pointer;font-size:15px;padding:0 3px;line-height:1}
  /* ── Rede parametrizada ── */
  .rede-section{border:1px solid #b2dfdb;border-radius:10px;padding:10px 12px;background:#e0f2f1;margin-bottom:10px}
  .rede-section .rede-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#00695c;margin-bottom:8px}
</style>
</head>
<body>

<!-- Overlay de autenticação — visível até a API responder -->
<div id="authOverlay">
  <img id="authLogo" alt="321 Modular">
  <!-- Spinner (visível durante autenticação automática) -->
  <div class="auth-spinner" id="authSpinner" style="display:none"></div>
  <!-- Mensagens de erro / status -->
  <div class="auth-msg" id="authMsg" style="display:none"></div>
  <!-- Formulário de login manual (visível quando não há token salvo) -->
  <div class="auth-form" id="authForm" style="display:none">
    <p class="auth-form-sub">Digite seu token de acesso</p>
    <input type="text" id="tokenInput" placeholder="Ex: JAG-a1b2c3d4" autocomplete="off" spellcheck="false">
    <button id="btnEntrar">Conectar</button>
    <label class="auth-remember">
      <input type="checkbox" id="rememberToken" checked>
      Lembrar meu acesso neste dispositivo
    </label>
  </div>
</div>

<header>
  <button class="tbtn menu-toggle" id="menuToggle" aria-label="Menu">☰</button>
  <img id="headerLogo" alt="321 Modular" style="height:30px;display:block">
  <span class="wordmark" style="display:none">3<b>2</b>1 MODULAR</span>
  <input class="proj" id="projName" placeholder="Planta sem título" aria-label="Nome do projeto">
  <div class="spacer"></div>
  <div class="bar-group">
    <button class="tbtn" id="btnNew">Nova</button>
    <button class="tbtn" id="btnQuant" title="Quantitativo e orçamento">📊 Quantitativo</button>
    <button class="tbtn accent" id="btnPdf">Exportar PDF</button>
    <button class="tbtn" id="btnJson">⤓ JSON</button>
    <button class="tbtn" id="btnImport">⤒ JSON</button>
  </div>
  <!-- Chip de sessão: perfil + franquia + botão Sair -->
  <div id="userInfoBar" class="user-chip" style="display:none">
    <span id="userPerfilBadge" class="user-chip-perfil"></span>
    <span class="user-chip-sep">·</span>
    <span id="userFranquia" class="user-chip-franquia"></span>
    <button id="btnLogout" title="Sair e limpar token">Sair</button>
  </div>
</header>

<main>
  <aside id="aside">
    <div id="tabsContainer" class="tabs-container"></div>
    <div class="inv" id="inv"></div>
    <div class="totals" id="totals"></div>
  </aside>

  <div class="stage">
    <svg id="canvas"></svg>
    <div class="tools">
      <button class="tool active" data-tool="select" title="Selecionar / mover (V)">▱</button>
      <button class="tool" data-tool="label" title="Rótulo de ambiente (T)">T</button>
      <button class="tool" data-tool="dim" title="Criar cota manual (C)">📏</button>
      <button class="tool" data-tool="pan" title="Mover tela (espaço)">✋</button>
    </div>
    <div class="footprint" id="footprint"></div>
    <div class="zoombar">
      <button id="zOut">−</button><span class="z" id="zVal">100%</span><button id="zIn">+</button>
      <button id="zFit" title="Enquadrar">⤢</button>
    </div>
    <div class="selbar" id="selbar"></div>
    <div class="hint">
      <b>(ESC/V)</b> Mover ou Selecionar<br>
      <b>(T)</b> Textos<br>
      <b>(C)</b> Cotas<br>
      <b>(ESPAÇO)</b> Mover câmera<br>
      ════════<br>
      <b>(CTRL/SHIFT+CLICK)</b> Múltipla seleção<br>
      <b>(D)</b> Duplicar seleção<br>
      <b>(DEL)</b> Exclui seleção<br>
      <b>(R)</b> Rotaciona seleção<br>
      ════════<br>
      <b>(CTRL+Z)</b> Desfazer<br>
      <b>(CTRL+Y)</b> Refazer
    </div>
  </div>
</main>

<input type="file" id="fileInput" accept="application/json" style="display:none">
<div class="scrim" id="scrim"><div class="modal" id="modalBody"></div></div>

<div class="scrim" id="previewScrim">
  <div class="modal" style="max-width:900px; height:90vh; display:flex; flex-direction:column; padding:12px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <h3 style="margin:0;">Pré-visualização do PDF</h3>
      <div style="display:flex; gap:8px;">
         <button class="tbtn accent" id="previewSaveBtn">Salvar PDF</button>
         <button class="tbtn" onclick="document.getElementById('previewScrim').classList.remove('show')">Fechar</button>
      </div>
    </div>
    <iframe id="previewFrame" style="flex:1; border:1px solid var(--line); border-radius:8px; background:#fff;"></iframe>
  </div>
</div>

<!-- Overlay isolado para configuração de margens (Gestor) — oculto por padrão -->
<div id="gestorOverlay">
  <div class="modal" id="gestorModalBody" style="max-width:420px;width:100%"></div>
</div>

let pricingData = null;
let pricingMap  = {};
let tokenAtivoSessao = ""; // token ativo na sessão atual (independente de localStorage ou URL)

// ── Re-fetches pricing data from the backend and refreshes open UI ──────────
// Called after a successful margin/price save so the app always shows the
// canonical server values instead of optimistic local overrides.
async function recarregarPrecos() {
  if (!tokenAtivoSessao) return;
  try {
    const res  = await fetch(`${GAS_URL}?token=${encodeURIComponent(tokenAtivoSessao)}`, { cache: "no-store" });
    if (!res.ok) return;
    const data = await res.json();
    if (!data.ok) return;
    pricingData = data;
    pricingMap  = {};
    (data.produtos || []).forEach(p => { pricingMap[p.nome] = p; });
    // Atualiza modal do quantitativo se estiver aberto
    if (document.querySelector('.scrim.show')) abrirQuantitativo();
  } catch (e) {
    console.warn("Falha ao recarregar preços:", e);
  }
}

const WIN_W=0.45; // largura da janela centralizada (metros)
function windowBlocks(edge,r,wallThick){
  // Janela centralizada de 45cm: dois blocos sólidos + vidro no meio
  const WALL_=wallThick||WALL;const dark="#1C1F24", glass="#BFD9EE";
  const segs=[];
  if(edge==="W"||edge==="E"){
    const x=(edge==="W")?r.x:(r.x+r.w-WALL_);
    const mid=r.y+r.h/2, g0=mid-WIN_W/2, g1=mid+WIN_W/2;
    if(g0>r.y)segs.push({x,y:r.y,w:WALL_,h:g0-r.y,fill:dark});
    segs.push({x,y:g0,w:WALL_,h:WIN_W,fill:glass,isWindow:true});
    if(g1<r.y+r.h)segs.push({x,y:g1,w:WALL_,h:r.y+r.h-g1,fill:dark});
  } else {
    const y=(edge==="N")?r.y:(r.y+r.h-WALL_);
    const mid=r.x+r.w/2, g0=mid-WIN_W/2, g1=mid+WIN_W/2;
    if(g0>r.x)segs.push({x:r.x,y,w:g0-r.x,h:WALL,fill:dark});
    segs.push({x:g0,y,w:WIN_W,h:WALL,fill:glass,isWindow:true});
    if(g1<r.x+r.w)segs.push({x:g1,y,w:r.x+r.w-g1,h:WALL,fill:dark});
  }
  return segs;
}

        t.textContent=pd.text||"";
        target.appendChild(t);
      }
    }
  });
}

// Lays out a set of screen-space text labels (esquadria names) avoiding overlaps:
// alternates rows when two labels would collide, and wraps multi-word labels
// onto two lines when even the alternate row can't fit them.
function layoutEsqTexts(items, preBlocked=[]){
  const HGAP=4, VGAP=3;
  items.sort((a,b)=>a.sx-b.sx);
  // Seed with oitão bounding boxes so esquadria labels are pushed away from
  // them before the label-vs-label collision search even begins.
  const placedBoxes=preBlocked.map(b=>({x1:b.x1,y1:b.y1,x2:b.x2,y2:b.y2}));
  // Splits text into `parts` lines. Prefers breaking at spaces; falls back
  // to a raw character split when there aren't enough words to split on
  // (e.g. a single-word esquadria name) — so even those can still wrap
  // instead of just shifting further away.
  const splitInto=(text,parts)=>{
    const words=(text||"").split(" ");
    if(words.length>=parts){
      const lines=[];const per=Math.ceil(words.length/parts);
      for(let i=0;i<words.length;i+=per)lines.push(words.slice(i,i+per).join(" "));
      return lines.filter(Boolean);
    }
    const s=text||"";const per=Math.ceil(s.length/parts);
    const lines=[];
    for(let i=0;i<s.length;i+=per)lines.push(s.slice(i,i+per));
    return lines.filter(Boolean);
  };
  items.forEach(it=>{
    const fontSize=it.fontSize||10;
    const charW=fontSize*0.64;
    const text=it.text||"";
    const words=text.split(" ");
    // Variants in priority order: MOST wrapped (most compact / narrowest)
    // first, down to a single full line last. Compactness comes first —
    // we always try to break the label down as much as it makes sense
    // (one word per line, or short character chunks for a single long
    // word) before ever falling back to a wider layout.
    const variants=[];
    const seen=new Set();
    const maxParts=words.length>1 ? words.length : Math.min(4,Math.ceil(text.length/3)||1);
    for(let parts=maxParts;parts>=2;parts--){
      const lines=splitInto(text,parts);
      if(lines.length<2)continue;
      const key=lines.join("|");
      if(seen.has(key))continue;
      seen.add(key);
      variants.push({lines,width:Math.max(...lines.map(l=>l.length*charW))});
    }
    variants.push({lines:null,width:Math.max(text.length*charW,charW*2)});
    const lineH=fontSize+2;
    // For every variant, search a small grid of candidate offsets around
    // the esquadria's own anchor point — both axes, both directions —
    // sorted by actual distance, and use the first one that doesn't
    // collide with anything already placed. Horizontal moves are weighed
    // a bit more than vertical ones so the label prefers to slide up/down
    // (which reads naturally next to a wall) before drifting sideways.
    let best=null;
    for(const v of variants){
      const nLines=v.lines?v.lines.length:1;
      const boxW=v.width+HGAP*2;
      const boxH=lineH*nLines+VGAP*2;
      const xStep=boxW*0.55, yStep=lineH;
      const candidates=[];
      for(let mx=-3;mx<=3;mx++){
        for(let my=-4;my<=4;my++){
          const dx=mx*xStep, dy=my*yStep;
          candidates.push({dx,dy,dist:Math.hypot(dx*1.3,dy)});
        }
      }
      candidates.sort((a,b)=>a.dist-b.dist);
      for(const c of candidates){
        const cx=it.sx+c.dx, cy=it.sy+c.dy;
        const x1=cx-boxW/2, x2=cx+boxW/2;
        const y1=cy-fontSize*0.8-VGAP, y2=y1+boxH;
        const collide=placedBoxes.some(b=>x1<b.x2 && x2>b.x1 && y1<b.y2 && y2>b.y1);
        if(!collide){
          if(best===null || c.dist<best.dist){
            best={dist:c.dist,dx:c.dx,dy:c.dy,width:v.width,lines:v.lines,x1,y1,x2,y2};
          }
          break; // candidates sorted by distance — first free one is this variant's best
        }
      }
      if(best && best.dist===0)break; // already touching the esquadria — can't do better
    }
    if(!best){
      // Extremely crowded fallback (search grid exhausted): stack below
      // whatever is already placed in the same horizontal range.
      const v=variants[0];
      const nLines=v.lines?v.lines.length:1;
      const boxW=v.width+HGAP*2, boxH=lineH*nLines+VGAP*2;
      let dy=0;
      placedBoxes.forEach(b=>{ if(b.x1<it.sx+boxW/2 && b.x2>it.sx-boxW/2) dy=Math.max(dy,b.y2-it.sy); });
      const cy=it.sy+dy;
      best={dist:dy,dx:0,dy,width:v.width,lines:v.lines,x1:it.sx-boxW/2,y1:cy-fontSize*0.8-VGAP,x2:it.sx+boxW/2,y2:cy-fontSize*0.8-VGAP+boxH};
    }
    it.lines=best.lines;
    it.dx=best.dx;
    it.dy=best.dy;
    it.finalWidth=best.width;
    placedBoxes.push({x1:best.x1,y1:best.y1,x2:best.x2,y2:best.y2});
  });
  return items;
}
// Screen-space AABBs of free-standing wall instances, used to keep esquadria
// labels from landing on top of a wall (which makes them unreadable).
function wallScreenBoxes(){
  return state.wallInstances.map(wi=>{
    const a=wallAABB(wi);if(!a)return null;
    const[x1,y1]=toScreen(a.x,a.y);const[x2,y2]=toScreen(a.x+a.w,a.y+a.h);
    return{x:Math.min(x1,x2),y:Math.min(y1,y2),w:Math.abs(x2-x1),h:Math.abs(y2-y1)};
  }).filter(Boolean);
}
function boxesOverlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function drawEsqTexts(items, preBlocked=[]){
  if(!items.length)return;
  const g=el("g",{"data-esqtexts":"1"});
  const wBoxes=wallScreenBoxes();
  layoutEsqTexts(items, preBlocked).forEach(it=>{
    const lineH=(it.fontSize||10)+2;
    const nLines=it.lines?it.lines.length:1;
    const origSx=it.sx, origSy=it.sy;
    let cx=it.sx+(it.dx||0), cy=it.sy+(it.dy||0);
    // nudge further away if a free-standing wall sits right under the label
    for(let tries=0;tries<3;tries++){
      const box={x:cx-it.finalWidth/2-3,y:cy-(it.fontSize||10)*0.8,w:it.finalWidth+6,h:lineH*nLines+4};
      if(!wBoxes.some(b=>boxesOverlap(box,b)))break;
      cy+=lineH;
    }
    // When the label had to move away from the esquadria (in any
    // direction — up, down, or sideways — and/or the wall-avoidance nudge
    // above), draw a thin leader line back to the esquadria's own anchor
    // point so the association stays clear even when the text can't sit
    // right on top of it.
    if(Math.hypot(cx-origSx,cy-origSy)>4){
      g.appendChild(el("line",{
        x1:origSx,y1:origSy,x2:cx,y2:cy-(it.fontSize||10)*0.4,
        stroke:it.fill||"#1C1F24","stroke-width":1,"stroke-dasharray":"2 2",opacity:.55
      }));
    }
    const t=el("text",{x:cx,y:cy,fill:it.fill,
      stroke:"rgba(255,255,255,0.9)","stroke-width":"3","paint-order":"stroke fill",
      "font-size":it.fontSize,"font-family":"Montserrat, sans-serif","font-weight":600,"text-anchor":"middle"});
    if(it.lines){
      it.lines.forEach((ln,i)=>{
        const ts=el("tspan",{x:cx,dy:i===0?0:(it.fontSize+2)});
        ts.textContent=ln;t.appendChild(ts);
      });
    } else {
      t.textContent=it.text;
    }
    g.appendChild(t);
  });
  svg.appendChild(g);
}

function render(){
  const r=svg.getBoundingClientRect();
  svg.setAttribute("viewBox",`0 0 ${r.width} ${r.height}`);
  svg.innerHTML="";
  const wTL=[(0-view.tx)/view.scale,(0-view.ty)/view.scale];
  const wBR=[(r.width-view.tx)/view.scale,(r.height-view.ty)/view.scale];
  const g=el("g");
  for(let x=Math.floor(wTL[0]/GRID)*GRID;x<=Math.ceil(wBR[0]/GRID)*GRID;x+=GRID){const sx=x*view.scale+view.tx;
    const mj=Math.abs(Math.round(x/5)*5-x)<1e-6;
    g.appendChild(el("line",{x1:sx,y1:0,x2:sx,y2:r.height,stroke:mj?"var(--grid-major)":"var(--grid)","stroke-width":1}));}

    const mj=Math.abs(Math.round(y/5)*5-y)<1e-6;
    g.appendChild(el("line",{x1:0,y1:sy,x2:r.width,y2:sy,stroke:mj?"var(--grid-major)":"var(--grid)","stroke-width":1}));}

      if(rc.floor){

      if(rc.isLamina){a.stroke="#5A626C";a["stroke-width"]=1;a["vector-effect"]="non-scaling-stroke";}
      if(rc.isEsq){a.stroke=ESQ_STROKE;a["stroke-width"]=1;a["vector-effect"]="non-scaling-stroke";}
      grp.appendChild(el("rect",a));});
    svg.appendChild(grp);
    appendPaths(grp, parts.paths, esqTextSink);
    // ── Rede parametrizada: crosshatch sobre área cadastrada no tipo ──────

        svgDefs.appendChild(cp);
        // Sem fundo — área totalmente vazada
        // Trama: linhas a cada ~10cm, cor escura para visibilidade

        const trama=el("g",{stroke:"rgba(0,0,0,0.50)","stroke-width":"0.8","vector-effect":"non-scaling-stroke","clip-path":`url(#${clipId})`});
        for(let y=sy;y<=sy+ph+spacing;y+=spacing)trama.appendChild(el("line",{x1:sx,y1:y,x2:sx+pw,y2:y}));
        for(let x=sx;x<=sx+pw+spacing;x+=spacing)trama.appendChild(el("line",{x1:x,y1:sy,x2:x,y2:sy+ph}));

    }

    if(p.oitaoAtivo&&tyR&&tyR.possuiPossibilidadeOitao){

      // Âncora = ponto médio da face exterior do hwall em coordenadas-mundo, considerando a rotação
      let _owx, _owy;

        const [_lxS,_lxE]=hwallLocalXRange(tyR.hwall,_W);

        grp.appendChild(ot);
      }
    }
    if(parts.name.show&&parts.name.text){const[nx,ny]=toScreen(parts.name.x,parts.name.y);
      const ng=el("g",{"data-name":p.id,style:"cursor:move"});

        svg.appendChild(el("line",{x1:ex2,y1:ey2,x2:sx2,y2:ey2,stroke:"var(--accent)","stroke-width":1,"stroke-dasharray":"2 2","vector-effect":"non-scaling-stroke"}));
      }
      svg.appendChild(el("line",{x1:sx1,y1:sy1,x2:sx2,y2:sy2,stroke:"var(--accent)","stroke-width":1.8,"vector-effect":"non-scaling-stroke"}));
      const mx=(sx1+sx2)/2, my=(sy1+sy2)/2;
      const label=fmt(len)+" m";
      svg.appendChild(el("rect",{x:mx-tw_(label)/2-3,y:my-10,width:tw_(label)+6,height:16,fill:"rgba(255,255,255,.92)",rx:3}));
      const t=el("text",{x:mx,y:my+4,"text-anchor":"middle","font-size":12,"font-weight":700,fill:"var(--accent)","font-family":"Montserrat, sans-serif"});
      t.textContent=label;svg.appendChild(t);
      svg.appendChild(el("circle",{cx:ex1,cy:ey1,r:4,fill:"var(--accent)"}));
      svg.appendChild(el("circle",{cx:ex2,cy:ey2,r:4,fill:"var(--accent)"}));
    } else if(dimDraftP1){
      const[sx1,sy1]=toScreen(dimDraftP1[0],dimDraftP1[1]);
      const hov=dimHoverPt||dimDraftP1;
      const[sx2,sy2]=toScreen(hov[0],hov[1]);
      svg.appendChild(el("line",{x1:sx1,y1:sy1,x2:sx2,y2:sy2,stroke:"var(--accent)","stroke-width":1.5,"stroke-dasharray":"4 3","vector-effect":"non-scaling-stroke"}));
      svg.appendChild(el("circle",{cx:sx1,cy:sy1,r:4,fill:"var(--accent)"}));
      if(dimHoverPt){const[hx,hy]=toScreen(dimHoverPt[0],dimHoverPt[1]);
        svg.appendChild(el("circle",{cx:hx,cy:hy,r:5,fill:"none",stroke:"var(--accent)","stroke-width":2}));}
    } else if(dimHoverPt){
      const[hx,hy]=toScreen(dimHoverPt[0],dimHoverPt[1]);
      svg.appendChild(el("circle",{cx:hx,cy:hy,r:5,fill:"none",stroke:"var(--accent)","stroke-width":2}));
    }
  }

  if(tool==="place"&&armedType&&ghostPos){const ty=typeOf(armedType);
    const w=(ghostRot%180===0?ty.w:ty.d),h=(ghostRot%180===0?ty.d:ty.w);
    const[sx,sy]=toScreen(ghostPos[0]-w/2,ghostPos[1]-h/2);
    svg.appendChild(el("rect",{x:sx,y:sy,width:w*view.scale,height:h*view.scale,
      fill:ty.color,"fill-opacity":.3,stroke:"var(--accent)","stroke-width":1.5,"stroke-dasharray":"4 3"}));}
  if(tool==="placewall"&&armedWallType&&ghostPos){
    const ghostInst={wallTypeId:armedWallType,ax:ghostPos[0],ay:ghostPos[1],rot:ghostRot};
    const parts=wallInstanceParts(ghostInst);
    const ghostBad=wallGhostOnLamina(ghostInst)||wallOverlapsAny(ghostInst,null)||!!wallPisoCompatError(ghostInst);
    const ghostClr=ghostBad?"#D6336C":"var(--accent)";
    parts.polys.forEach(po=>{
      const pts=po.pts.map(([x,y])=>toScreen(x,y).join(",")).join(" ");
      svg.appendChild(el("polygon",{points:pts,fill:ghostClr,"fill-opacity":.35,stroke:ghostClr,"stroke-width":1.5,"stroke-dasharray":"4 3"}));
    });
  }
  // Rubber-band selection box
  if(drag && drag.kind==="rubberband" && drag.hasMoved){
    const rb=rectFromRubberband(drag);
    const[sx,sy]=toScreen(rb.x,rb.y);
    svg.appendChild(el("rect",{x:sx,y:sy,
      width:rb.w*view.scale,height:rb.h*view.scale,
      fill:"rgba(100,160,255,0.10)",
      stroke:"#64A0FF","stroke-width":1.5,
      "stroke-dasharray":"5 3",
      "vector-effect":"non-scaling-stroke",
      style:"pointer-events:none"}));
  }
  // ── Oitão em wallInstances ────────────────────────────────────────────
  state.wallInstances.forEach(wi=>{
    if(!wi.oitaoAtivo) return;
    const wtO=wallTypeOf(wi.wallTypeId);
    if(!wtO||!wtO.possuiPossibilidadeOitao) return;
    const a=wallAABB(wi); if(!a) return;
    // Horizontal (a.w>=a.h): topo-centro. Vertical (a.h>a.w): face esquerda, meio da altura
    const isWide=a.w>=a.h;
    const [sx,sy]=isWide ? toScreen(a.x+a.w/2,a.y) : toScreen(a.x, a.y+a.h/2);
    const aw=10,ah=10;
    const arrowW=el("polygon",{
      points:`${sx},${sy-ah} ${sx-aw/2},${sy} ${sx+aw/2},${sy}`,
      fill:"#1f331b", stroke:"#fff","stroke-width":"0.8",
      "vector-effect":"non-scaling-stroke",style:"pointer-events:none"
    });
    svg.appendChild(arrowW);
    if(wtO.nomeOitao){
      // Texto à esquerda (text-anchor="end") para paredes verticais, à direita para horizontais
      const otW=el("text",{
        x: isWide ? sx+aw/2+4 : sx-aw/2-4,
        y: sy-3, fill:"#1f331b",
        "text-anchor": isWide ? "start" : "end",
        stroke:"rgba(255,255,255,0.85)","stroke-width":"3","paint-order":"stroke fill",
        "font-family":"'Montserrat',sans-serif","font-size":"9","font-weight":"700",
        style:"pointer-events:none"
      });
      otW.textContent=wtO.nomeOitao;
      svg.appendChild(otW);
    }
  });
  updateHud();
}
function updateHud(){
  document.getElementById("zVal").textContent=Math.round(view.scale/46*100)+"%";
  const bb=contentBBox();
  document.getElementById("footprint").innerHTML=
    `<b>${fmt(bb.w)} × ${fmt(bb.h)}</b> m<br><span class="a">${fmt(occupiedArea())} m²</span>`;
  renderSelbar();
}

function renderSelbar(){
  const bar=document.getElementById("selbar");
  // Multi-seleção: mostrar barra especial se houver mais de 1 item selecionado
  if(selIds.size > 1){
    bar.classList.add("show");
    bar.innerHTML=`<span class="lab">selecionados</span>
      <span class="lab" style="color:#cfd4da;font-family:var(--mono)">${selIds.size} itens</span>
      <span class="sep"></span>
      <button id="multiDup">⧉ Duplicar todos</button>
      <button class="del" id="multiDel">🗑 Excluir todos</button>`;
    bar.querySelector("#multiDup").onclick=dupSel;
    bar.querySelector("#multiDel").onclick=delSel;
    return;
  }
  const p=state.panels.find(p=>p.id===selId);
  const wi=(!p)?state.wallInstances.find(s=>s.id===selId):null;
  const lb=(!p&&!wi)?state.labels.find(l=>l.id===selId):null;
  const dm=(!p&&!wi&&!lb)?state.manualDims.find(d=>d.id===selId):null;
  if(!p&&!wi&&!lb&&!dm){bar.classList.remove("show");bar.innerHTML="";return;}
  if(dm){
    const len=Math.hypot(dm.p2[0]-dm.p1[0],dm.p2[1]-dm.p1[1]);
    bar.classList.add("show");
    bar.innerHTML=`<span class="lab">cota</span>
      <span class="lab" style="color:#cfd4da;font-family:var(--mono)">${fmt(len)} m</span>
      <span class="sep"></span>
      <button class="del" id="dDel">🗑 Excluir</button>`;
    bar.querySelector("#dDel").onclick=delSel;
    return;
  }
  if(lb){
    bar.classList.add("show");
    bar.innerHTML=`<span class="lab">rótulo</span>
      <span class="lab" style="color:#cfd4da">${esc(lb.text)}</span>
      <span class="sep"></span>
      <button id="lRen">✎ Editar texto</button>
      <button class="del" id="lDel">🗑 Excluir</button>`;
    bar.querySelector("#lRen").onclick=renameLabel;
    bar.querySelector("#lDel").onclick=delSel;
    return;
  }
  if(wi){
    const wt=wallTypeOf(wi.wallTypeId);
    bar.classList.add("show");
    const len=wt?wallTypeLength(wt):0;
    const _doors=(wt&&wt.doors&&wt.doors.length)?wt.doors:(wt&&wt.door?[wt.door]:[]);
    const hasDoorFlex=!!(_doors.length>0&&wt&&wt.doorFlexible);
    const _firstDoor=_doors[0]||null;
    const curOpens=wi.doorOpens||(_firstDoor&&_firstDoor.opens)||"fora";
    const curHinge=wi.doorHinge||(_firstDoor&&_firstDoor.hinge)||"esquerda";
    const doorPart=hasDoorFlex?`
      <span class="sep"></span>
      <span class="lab">abre</span>
      <button id="wOpDentro" class="${curOpens==="dentro"?"on":""}">Dentro</button>
      <button id="wOpFora" class="${curOpens==="fora"?"on":""}">Fora</button>
      <span class="sep"></span>
      <span class="lab">dobradiça</span>
      <button id="wHgEsq" class="${curHinge==="esquerda"?"on":""}">◁ Esq</button>
      <button id="wHgDir" class="${curHinge==="direita"?"on":""}">▷ Dir</button>`:"";
    bar.innerHTML=`<span class="lab">parede</span>
      <span class="lab" style="color:#cfd4da;font-family:var(--mono)">${esc(wt?wt.name:"?")} · ${fmt(len)} m</span>
      <span class="sep"></span>
      <button id="wRotate">↻ Girar</button>
      <button id="wDup">⧉ Duplicar</button>
      <button class="del" id="wDel">🗑 Excluir</button>${doorPart}`;
    bar.querySelector("#wRotate").onclick=rotateSel;
    bar.querySelector("#wDup").onclick=dupSel;
    bar.querySelector("#wDel").onclick=delSel;
    if(hasDoorFlex){
      const setDoor=(opens,hinge)=>{saveState();wi.doorOpens=opens;wi.doorHinge=hinge;render();};
      bar.querySelector("#wOpDentro").onclick=()=>setDoor("dentro",curHinge);
      bar.querySelector("#wOpFora").onclick=()=>setDoor("fora",curHinge);
      bar.querySelector("#wHgEsq").onclick=()=>setDoor(curOpens,"esquerda");
      bar.querySelector("#wHgDir").onclick=()=>setDoor(curOpens,"direita");
    }
    // Oitão para parede
    if(wt&&wt.possuiPossibilidadeOitao){
      const oSep=document.createElement("span");oSep.className="sep";bar.appendChild(oSep);
      const oLab=document.createElement("span");oLab.className="lab";oLab.textContent="oitão";bar.appendChild(oLab);
      const oBtn=document.createElement("button");
      oBtn.className=wi.oitaoAtivo?"on":"";
      oBtn.textContent=wi.oitaoAtivo?"▲ Ativado":"△ Ativar";
      oBtn.onclick=()=>{saveState();wi.oitaoAtivo=!wi.oitaoAtivo;render();renderSelbar();};
      bar.appendChild(oBtn);
    }
    return;
  }
  if(!p){bar.classList.remove("show");bar.innerHTML="";return;}
  bar.classList.add("show");
  const w=p.walls||{l:"solid",r:"solid"},c=p.corners||{},nm=p.name||{};
  const pty=typeOf(p.typeId);
  const wallsLocked=!!(pty&&pty.lockWalls);
  
  const wl = (!w.l || w.l === 'none');
  const wr = (!w.r || w.r === 'none');
  
  bar.innerHTML=`<span class="lab">nome</span>
    <button id="nShow" class="${nm.show!==false?'on':''}">${nm.show!==false?'visível':'oculto'}</button>
    <button id="nRen">renomear</button>
    <span class="sep"></span>
    <span class="lab">paredes${wallsLocked?' 🔒':''}</span>
    <button class="cstate" data-side="l" ${wallsLocked?'disabled title="Paredes laterais bloqueadas para este modelo"':''}>Esq: ${WLAB[w.l||'none']}</button>
    <button class="cstate" data-side="r" ${wallsLocked?'disabled title="Paredes laterais bloqueadas para este modelo"':''}>Dir: ${WLAB[w.r||'none']}</button>
    <span class="sep"></span>
    <span class="lab">cantos 14cm</span>
    <button class="corner ${c.tl?'on':''}" data-c="tl" title="superior esquerdo" ${wl?'':'disabled'}>◰</button>
    <button class="corner ${c.tr?'on':''}" data-c="tr" title="superior direito" ${wr?'':'disabled'}>◳</button>
    <button class="corner ${c.bl?'on':''}" data-c="bl" title="inferior esquerdo" ${wl?'':'disabled'}>◱</button>
    <button class="corner ${c.br?'on':''}" data-c="br" title="inferior direito" ${wr?'':'disabled'}>◲</button>
    <span class="sep"></span>
    <button id="sRotate">↻ Girar</button>
    <button id="sDup">⧉ Duplicar</button>
    <button class="del" id="sDel">🗑 Excluir</button>`;
  
  bar.querySelector("#nShow").onclick=()=>{saveState(); p.name=p.name||{};p.name.show=!(p.name.show!==false);render();};
  bar.querySelector("#nRen").onclick=()=>renameSel();
  
  if(!wallsLocked)bar.querySelectorAll("[data-side]").forEach(b=>b.onclick=()=>{
    saveState();
    p.walls=p.walls||{};
    const k=b.dataset.side;p.walls[k]=WALLCYCLE[(WALLCYCLE.indexOf(p.walls[k]||"none")+1)%3];
    if(p.walls.l !== 'none') { p.corners.tl = false; p.corners.bl = false; }
    if(p.walls.r !== 'none') { p.corners.tr = false; p.corners.br = false; }
    render();});
    
  bar.querySelectorAll("[data-c]").forEach(b=>b.onclick=()=>{
    saveState();
    p.corners=p.corners||{};
    const isL = (b.dataset.c === 'tl' || b.dataset.c === 'bl');
    if (isL && !wl) return; 
    const isR = (b.dataset.c === 'tr' || b.dataset.c === 'br');
    if (isR && !wr) return;
    p.corners[b.dataset.c]=!p.corners[b.dataset.c];
    render();});
    
  bar.querySelector("#sRotate").onclick=rotateSel;
  bar.querySelector("#sDup").onclick=dupSel;
  bar.querySelector("#sDel").onclick=delSel;

  // ── Esquadrias do hwall (replicando lógica das paredes) ────────────────
  const hEsqs=(pty&&pty.hwall&&pty.hwall.esquadrias)||[];
  if(hEsqs.length>0){
    const esqSpan=document.createElement("span");
    esqSpan.className="lab";
    esqSpan.style.cssText="margin-left:4px;color:rgba(255,255,255,.5);font-size:10.5px";
    esqSpan.textContent="esq.: "+hEsqs.map(e=>e.name||e.type||"—").join(" · ");
    bar.appendChild(esqSpan);
  }

  // ── Oitão: toggle se o tipo possui essa possibilidade ─────────────────
  if(pty&&pty.possuiPossibilidadeOitao){
    const sep=document.createElement("span");sep.className="sep";bar.appendChild(sep);
    const oLab=document.createElement("span");oLab.className="lab";oLab.textContent="oitão";bar.appendChild(oLab);
    const oBtn=document.createElement("button");
    oBtn.id="oitaoToggle";
    oBtn.className=p.oitaoAtivo?"on":"";
    oBtn.textContent=p.oitaoAtivo?"▲ Ativado":"△ Ativar";
    oBtn.onclick=()=>{saveState();p.oitaoAtivo=!p.oitaoAtivo;render();renderSelbar();};
    bar.appendChild(oBtn);
  }
}

function renameSel(){const p=state.panels.find(p=>p.id===selId);if(!p)return;
  p.name=p.name||{text:"",dx:0,dy:0,show:true};
  const d=dims(p),orig={text:p.name.text||"",dx:p.name.dx||0,dy:p.name.dy||0};
  modalBody.innerHTML=`<h3>Nome do piso</h3>
    <div class="field"><label>Texto</label><input id="r_in" value="${esc(p.name.text||"")}"></div>
    <div class="field"><label>Posição do nome</label>
      <div class="swatches" id="r_pos" style="gap:6px">
        ${["Centro","Acima","Abaixo","Esquerda","Direita"].map(o=>`<button type="button" class="tbtn" data-pos="${o}">${o}</button>`).join("")}</div>
      <p class="sub" style="margin:6px 0 0">Você também pode arrastar o nome direto na planta. Ele sempre ficará contido dentro do piso.</p></div>
    <div class="modal-actions"><button class="tbtn" id="r_cancel">Cancelar</button><button class="tbtn primary" id="r_ok">Confirmar</button></div>`;
  const setPos=o=>{const h=d.h/2,w=d.w/2;
    p.name.dx=o==="Esquerda"?-(w-0.4):o==="Direita"?(w-0.4):0;
    p.name.dy=o==="Acima"?-(h-0.4):o==="Abaixo"?(h-0.4):0;render();};
  modalBody.querySelectorAll("[data-pos]").forEach(b=>b.onclick=()=>{saveState(); setPos(b.dataset.pos);});
  document.getElementById("r_cancel").onclick=()=>{p.name.text=orig.text;p.name.dx=orig.dx;p.name.dy=orig.dy;closeModal();render();};
  document.getElementById("r_ok").onclick=()=>{saveState(); p.name.text=document.getElementById("r_in").value.trim();p.name.show=true;closeModal();render();};
  scrim.classList.add("show");setTimeout(()=>{const i=document.getElementById("r_in");i.focus();i.select();},50);
}

function renameLabel(){
  const l=state.labels.find(l=>l.id===selId);if(!l)return;
  const orig=l.text;
  openTextModal("Editar rótulo de ambiente",l.text,txt=>{
    if(txt===null)return; 
    saveState();
    l.text=(txt||"").trim()||orig;
    render();
  });
}

function openWallTypeModal(id, cloneFrom){
  editingWallType=id?wallTypeOf(id):null;
  const src=(!editingWallType&&cloneFrom)?wallTypeOf(cloneFrom):null;
  const t=src
    ?{...src, name:"Cópia de "+src.name, tabIds:[...(src.tabIds||["geral"])]}
    :editingWallType||{name:"",length:2.00,thickness:0.10,door:null,doors:[],defaultRot:0,tabIds:["geral"]};
  // Initialize wtDoors from existing data
  wtDoors=(t.doors&&t.doors.length)?t.doors.map(d=>({...d})):(t.door?[{...t.door}]:[]);
  const modalTitle=src?`Duplicar: ${esc(src.name)}`:(id?"Editar tipo de parede":"Novo tipo de parede");
  modalBody.innerHTML=`<h3>${modalTitle}</h3>
    
    <!-- Exibir nas abas (sempre visível no topo) -->
    <div class="field" style="margin-bottom:8px"><label>Exibir nas abas:</label>
      <div style="display:flex;gap:10px;flex-wrap:wrap;padding:6px 0;">
        ${(state.tabs||[{id:'geral',name:'Geral'}]).map(tab => `
          <label style="display:flex; align-items:center; gap:4px; font-weight:600; text-transform:none; font-size:12px;">
            <input type="checkbox" class="tab-cb" value="${tab.id}" ${(t.tabIds||['geral']).includes(tab.id)?'checked':''} ${tab.id==='geral'?'disabled checked':''} style="width:auto;margin:0;">
            ${esc(tab.name)}
          </label>

  // Render dynamic door list
  renderWtDoors();
  document.getElementById("wt_add_door").onclick=()=>{
    wtDoors.push({at:0.10+wtDoors.length*0.90,w:0.80,tipo:"porta_giro",opens:"fora",hinge:"esquerda",name:"",showName:true});
    renderWtDoors();
  };

  // ── BOM Editor da Parede ──────────────────────────────────────────────
  const wtProdOptions = (pricingData?.produtos||[])
    .map(p=>`<option value="${esc(p.nome)}">${esc(p.nome)}</option>`).join('');
  const wtBomCondOptions = [
    {v:"padrao",            l:"Padrão / Sempre"},
    {v:"esq_esquadria_esq", l:"Se Esquadria = Esquerda"},
    {v:"esq_esquadria_dir", l:"Se Esquadria = Direita"},
    {v:"oitao_ativo",       l:"Se Oitão Ativo"},
  ].map(c=>`<option value="${c.v}">${c.l}</option>`).join('');

  let wtBomRows = JSON.parse(JSON.stringify(t.bomConfig||[]));

  function renderWtBomList(){
    const list = document.getElementById("wt_bom_list");
    if(!list) return;
    list.innerHTML = '';
    wtBomRows.forEach((row, i) => {
      const div = document.createElement('div');
      div.className = 'bom-row';
      div.innerHTML = `
        <select class="bom-prod">${wtProdOptions}</select>
        <select class="bom-cond">${wtBomCondOptions}</select>
        <input class="bom-qty" type="number" min="0.1" step="0.5" value="${row.qty||1}">
        <button class="bom-del" data-i="${i}" title="Remover">✕</button>`;
      div.querySelector('.bom-prod').value = row.produtoNome || '';
      div.querySelector('.bom-cond').value = row.condicao || 'padrao';
      div.querySelector('.bom-prod').onchange = e => { wtBomRows[i].produtoNome = e.target.value; };
      div.querySelector('.bom-cond').onchange = e => { wtBomRows[i].condicao = e.target.value; };
      div.querySelector('.bom-qty').onchange  = e => { wtBomRows[i].qty = Math.max(0.1, parseFloat(e.target.value)||1); };
      div.querySelector('.bom-del').onclick   = () => { wtBomRows.splice(i,1); renderWtBomList(); };
      list.appendChild(div);
    });
  }
  renderWtBomList();
  document.getElementById("wt_bom_add").onclick = () => {
    const firstProd = (pricingData?.produtos||[])[0]?.nome || '';
    wtBomRows.push({produtoNome: firstProd, condicao: 'padrao', qty: 1});
    renderWtBomList();
  };
  document.getElementById("wt_bom_copy").onclick = () => {
    wtBomClipboard = JSON.parse(JSON.stringify(wtBomRows));
    toast("BOM da parede copiado! Cole em outra parede.");
  };
  document.getElementById("wt_bom_paste").onclick = () => {
    if(!wtBomClipboard){toastError("Nenhum BOM de parede copiado ainda.");return;}
    wtBomRows = JSON.parse(JSON.stringify(wtBomClipboard));
    renderWtBomList();
    toast("BOM colado com sucesso.");
  };

  let curDefaultRot=t.defaultRot||0;
  document.getElementById("wt_rot_val").textContent=curDefaultRot+"°";
  document.getElementById("wt_rot_btn").onclick=()=>{
    curDefaultRot=(curDefaultRot+90)%360;
    document.getElementById("wt_rot_val").textContent=curDefaultRot+"°";
  };

  // No wt_door checkbox anymore - doors managed dynamically
  document.getElementById("wt_cancel").onclick=closeModal;
  if(id)document.getElementById("wt_del").onclick=()=>{
    if(usedCountWall(id)&&!confirm("Há paredes desse tipo na planta. Excluir o tipo e remover as paredes?"))return;
    state.wallInstances=state.wallInstances.filter(wi=>wi.wallTypeId!==id);
    state.wallTypes=state.wallTypes.filter(wt=>wt.id!==id);
    closeModal();renderInv();render();
  };
  // Wire wall oitão checkbox visibility
  const wtOitaoChk=document.getElementById("wt_oitao_chk");
  const wtOitaoNomeRow=document.getElementById("wt_oitao_nome_row");
  if(wtOitaoChk) wtOitaoChk.onchange=()=>{if(wtOitaoNomeRow) wtOitaoNomeRow.style.display=wtOitaoChk.checked?"":"none";};

  document.getElementById("wt_save").onclick=()=>{
    saveState();
    const name=document.getElementById("wt_name").value.trim()||"Parede";
    const thickness=Math.max(0.02,parseFloat(document.getElementById("wt_th").value)||0.10);
    const length=Math.max(0.10,parseFloat(document.getElementById("wt_len").value)||2.00);
    const defaultRot=parseInt(document.getElementById("wt_rot_val").textContent,10)||0;
    
    let tabIds = Array.from(document.querySelectorAll('.tab-cb:checked')).map(cb => cb.value);
    if(!tabIds.includes("geral")) tabIds.push("geral");

    // Collect doors from dynamic list
    const doorsData=wtDoors.map(d=>({
      at:Math.max(0,parseFloat(d.at)||0),
      w:Math.max(0.3,parseFloat(d.w)||0.8),
      tipo:d.tipo||"porta_giro",
      opens:d.opens||"fora",hinge:d.hinge||"esquerda",
      name:d.name||"",showName:d.showName!==false
    }));
    const door=doorsData.length>0?doorsData[0]:null;
    const doorFlexible=!!(doorsData.length>0&&document.getElementById("wt_flex").checked);
    const allowedPisoIds=Array.from(document.querySelectorAll(".wt-piso-cb:checked")).map(cb=>cb.value);

    // Oitão da parede
    const wtOChk=document.getElementById("wt_oitao_chk");
    const possuiPossibilidadeOitao=!!(wtOChk&&wtOChk.checked);
    const nomeOitao=possuiPossibilidadeOitao?(document.getElementById("wt_oitao_nome")?.value?.trim()||""):"";
    const oitaoDefaultAtivo=possuiPossibilidadeOitao&&!!(document.getElementById("wt_oitao_default")?.checked);

    if(editingWallType)Object.assign(editingWallType,{name,length,thickness,door,doors:doorsData,doorFlexible,allowedPisoIds,defaultRot,tabIds,bomConfig:wtBomRows,possuiPossibilidadeOitao,nomeOitao,oitaoDefaultAtivo});
    else state.wallTypes.push({id:uid(),name,length,thickness,door,doors:doorsData,doorFlexible,allowedPisoIds,defaultRot,tabIds,bomConfig:wtBomRows,possuiPossibilidadeOitao,nomeOitao,oitaoDefaultAtivo});
    closeModal();renderInv();render();
  };
  scrim.classList.add("show");setTimeout(()=>document.getElementById("wt_name").focus(),50);
}

function renderTabs() {
  const tc = document.getElementById("tabsContainer");
  if(!tc) return;
  tc.innerHTML = "";
  const isUsed = state.panels.length > 0 || state.wallInstances.length > 0;

  (state.tabs || []).forEach(tab => {
    const b = document.createElement("button");
    b.className = "tbtn " + (state.activeTab === tab.id ? "active" : "");
    b.textContent = tab.name;
    if (isUsed && state.activeTab !== tab.id) {
       b.style.opacity = "0.5";
    }
    b.onclick = () => {
      if (state.activeTab === tab.id) return;
      if (isUsed) {
        toastError("Planta em uso. Limpe a planta (Nova) para trocar de aba.");
        return;
      }
      state.activeTab = tab.id;
      renderTabs();
      renderInv();
    };
    tc.appendChild(b);
  });

  const n = document.createElement("button");
  n.className = "tbtn";
  n.style.color = "var(--accent)";
  n.textContent = "+ Aba";
  n.onclick = () => {
    requireAdmin(() => {
      openTextModal("Nova Aba", "", txt => {
        if(txt && txt.trim()) {
          saveState();
          const newTab = {id: uid(), name: txt.trim()};
          if(!state.tabs) state.tabs = []; 
          state.tabs.push(newTab);
          if(!isUsed) state.activeTab = newTab.id; 
          renderTabs();
          renderInv();
        }
      });
    });
  };
  tc.appendChild(n);
}

function usedCount(id){return state.panels.filter(p=>p.typeId===id).length;}
function usedCountWall(id){return state.wallInstances.filter(wi=>wi.wallTypeId===id).length;}

function renderInv(){
  const inv=document.getElementById("inv");inv.innerHTML="";
  
  const currentTypes = state.types.filter(t => t.tabIds && t.tabIds.includes(state.activeTab));
  const floorTypes = currentTypes.filter(t=>!isMez(t)).slice().sort((a,b)=>a.name.localeCompare(b.name,'pt'));
  const mezTypes = currentTypes.filter(t=>isMez(t)).slice().sort((a,b)=>a.name.localeCompare(b.name,'pt'));

  const renderTypeCard=(ty)=>{
    const used=usedCount(ty.id);
    const isGeral=state.activeTab==='geral';
    const canPlace=!isGeral||isAdmin();
    const card=document.createElement("div");card.className="ptype"+(armedType===ty.id?" armed":"")+(isGeral&&!isAdmin()?" geral-only":"");
    let swatchStyle = `background:${ty.color}`;
    if (ty.hwall) swatchStyle = (ty.hwall.twoTone!==false)
      ? `background: linear-gradient(180deg, ${WOOD_L} 50%, ${WOOD_D} 50%)`
      : `background: ${WOOD_L}`;
    if (isMez(ty)) swatchStyle = `background: linear-gradient(180deg, ${WOOD_L} 78%, #1C1F24 78%)`;
    const D=footD(ty);
    const dimsTxt = isMez(ty)
      ? `${fmt(ty.w)} × ${fmt(ty.d)} m (marrom) + ${fmt(ty.mezanino.th)} m parede · total ${fmt(D)} m · ${fmt(ty.w*ty.d)} m²`
      : `${fmt(ty.w)} × ${fmt(ty.d)} m · ${fmt(ty.w*ty.d)} m²`;
    const precoUnit=getPriceForType(ty.name);
    const priceBadge=precoUnit!==null
      ? `<span class="q-price-badge has-price">R$ ${precoUnit.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}</span>`
      : '';
    const adminBtns=isAdmin()?`
      <button class="mini" data-dup="${ty.id}" title="Duplicar tipo">⧉</button>
      <button class="mini" data-edit="${ty.id}">editar</button>`:'';
    card.innerHTML=`<div class="row1"><span class="swatch" style="${swatchStyle}"></span>
      <span class="pname">${isMez(ty)?"🏗 ":""}${esc(ty.name)}</span>

      <div class="dims">${dimsTxt}</div>
      ${priceBadge}

    if(canPlace) card.addEventListener("click",e=>{if(e.target.dataset.edit||e.target.dataset.dup)return;armPlace(ty.id);});
    else if(isGeral && !isAdmin()) {
      // Gestor/Vendedor na aba Geral: intercepta o clique e exibe aviso orientando o usuário
      card.addEventListener("click", e => {
        if(e.target.dataset.edit || e.target.dataset.dup) return;
        toastError("Você precisa escolher a aba de algum modelo para poder continuar.");
      });
    }
    if(isAdmin()){
      card.querySelector("[data-edit]")?.addEventListener("click",e=>{e.stopPropagation();requireAdmin(()=>openTypeModal(ty.id));});
      card.querySelector("[data-dup]")?.addEventListener("click",e=>{e.stopPropagation();requireAdmin(()=>openTypeModal(null,false,ty.id));});
    }
    inv.appendChild(card);
  };

  floorTypes.forEach(renderTypeCard);
  
  if(state.activeTab === 'geral' && isAdmin()){
    const addFloor=document.createElement("button");
    addFloor.className="add-type";addFloor.textContent="+ Adicionar tipo de piso";
    addFloor.style.margin="4px";
    addFloor.onclick=()=>requireAdmin(()=>openTypeModal(null));
    inv.appendChild(addFloor);
  }

  const mezHead=document.createElement("div");
  mezHead.style.cssText="margin:14px 4px 4px;padding-top:10px;border-top:1px solid var(--line);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:700";
  mezHead.textContent="Mezaninos disponíveis";
  inv.appendChild(mezHead);

  mezTypes.forEach(renderTypeCard);

  if(state.activeTab === 'geral' && isAdmin()){
    const addMez=document.createElement("button");
    addMez.className="add-type";addMez.textContent="+ Adicionar mezanino";
    addMez.style.margin="4px";
    addMez.onclick=()=>requireAdmin(()=>openTypeModal(null,true));
    inv.appendChild(addMez);
  }

  const wallHead=document.createElement("div");
  wallHead.style.cssText="margin:14px 4px 4px;padding-top:10px;border-top:1px solid var(--line);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:700";
  wallHead.textContent="Paredes disponíveis";
  inv.appendChild(wallHead);

  const currentWallTypes = state.wallTypes.filter(wt => wt.tabIds && wt.tabIds.includes(state.activeTab)).slice().sort((a,b)=>a.name.localeCompare(b.name,'pt'));
  currentWallTypes.forEach(wt=>{
    const used=usedCountWall(wt.id);
    const isGeral=state.activeTab==='geral';
    const canPlace=!isGeral||isAdmin();
    const info=wallTypeRectInfo(wt);
    const _selPanel2=state.panels.find(p=>p.id===selId);
    const _pisoTid=_selPanel2?_selPanel2.typeId:null;
    const _wtOk=!(wt.allowedPisoIds&&wt.allowedPisoIds.length>0)||!_pisoTid||!wt.allowedPisoIds.includes(_pisoTid);
    const card=document.createElement("div");card.className="ptype"+(armedWallType===wt.id?" armed":"")+(isGeral&&!isAdmin()?" geral-only":"");
    if(!_wtOk){card.style.opacity="0.35";card.title="Incompatível com o tipo de piso selecionado";}
    const wallAdminBtns=isAdmin()?`
      <button class="mini" data-dup="${wt.id}" title="Duplicar parede">⧉</button>
      <button class="mini" data-edit="${wt.id}">editar</button>`:'';
    card.innerHTML=`<div class="row1"><span class="swatch" style="background:#1C1F24"></span>
      <span class="pname">${esc(wt.name)}</span>
      ${wallAdminBtns}</div>
      <div class="dims">${fmt(info.length)} m · esp. ${fmt(info.thickness)} m${wt.door?" · 🚪 com porta":""}</div>

    if(canPlace) card.addEventListener("click",e=>{if(e.target.dataset.edit||e.target.dataset.dup)return;armWallPlace(wt.id);});
    else if(isGeral && !isAdmin()) {
      // Gestor/Vendedor na aba Geral: intercepta o clique e exibe aviso orientando o usuário
      card.addEventListener("click", e => {
        if(e.target.dataset.edit || e.target.dataset.dup) return;
        toastError("Você precisa escolher a aba de algum modelo para poder continuar.");
      });
    }
    if(isAdmin()){
      card.querySelector("[data-edit]")?.addEventListener("click",e=>{e.stopPropagation();requireAdmin(()=>openWallTypeModal(wt.id));});
      card.querySelector("[data-dup]")?.addEventListener("click",e=>{e.stopPropagation();requireAdmin(()=>openWallTypeModal(null,wt.id));});
    }
    inv.appendChild(card);
  });
  
  if(state.activeTab === 'geral' && !isAdmin()){
    const hint=document.createElement("p");
    hint.style.cssText="font-size:11px;color:var(--ink-faint);margin:8px 4px 0;line-height:1.5;";

    inv.appendChild(hint);

  if(state.activeTab === 'geral' && isAdmin()){
    const addWall=document.createElement("button");
    addWall.className="add-type";addWall.textContent="+ Adicionar tipo de parede";
    addWall.style.margin="4px";
    addWall.onclick=()=>requireAdmin(()=>openWallTypeModal(null));
    inv.appendChild(addWall);
  }

  const totUsed=state.panels.length;
  document.getElementById("totals").innerHTML=
    `<div class="line"><span>Pisos em uso</span><b>${totUsed}</b></div>
     <div class="line area"><span>Área ocupada</span><b>${fmt(occupiedArea())} m²</b></div>`;
